version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - APPROVAL_CHANNEL=${APPROVAL_CHANNEL:-#access-approvals}
      - CREDENTIAL_TTL=3600
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
